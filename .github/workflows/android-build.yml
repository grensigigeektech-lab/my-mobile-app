name: Build Android APK

on:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-android:
    name: Build and deliver Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      DRIVE_ENV_FILE_ID: 1_gc0qpz96vgFGCNFLciH0h2gaRxSzu6TLIQbv24lKcI
      DRIVE_APK_FOLDER_ID: 1UGi_3NOOuXefyyMhv_qSJFjm5W8nnop5
      DRIVE_FAILURE_FOLDER_ID: 1pixadbRshFbbMM9qCvt4nG-sBo8Krvcy
      BUILD_LOG_DIR: ${{ runner.temp }}/android-build-logs

    steps:
      # This is intentionally the first setup step. The target folders are in
      # My Drive (not a shared drive), so this uses a human OAuth refresh token.
      # Store client_id, client_secret, and refresh_token as one JSON object in
      # the GOOGLE_DRIVE_OAUTH_JSON Actions secret; never commit it.
      - name: Authenticate to Google Drive
        id: drive-auth
        continue-on-error: true
        shell: bash
        env:
          GOOGLE_DRIVE_OAUTH_JSON: ${{ secrets.GOOGLE_DRIVE_OAUTH_JSON }}
        run: |
          set -Eeuo pipefail
          mkdir -p "$BUILD_LOG_DIR"
          exec > >(tee "$BUILD_LOG_DIR/drive-auth.log") 2>&1

          if [[ -z "$GOOGLE_DRIVE_OAUTH_JSON" ]]; then
            echo "Required repository secret GOOGLE_DRIVE_OAUTH_JSON is missing." >&2
            exit 1
          fi

          CLIENT_ID="$(jq -er '.client_id' <<<"$GOOGLE_DRIVE_OAUTH_JSON")"
          CLIENT_SECRET="$(jq -er '.client_secret' <<<"$GOOGLE_DRIVE_OAUTH_JSON")"
          REFRESH_TOKEN="$(jq -er '.refresh_token' <<<"$GOOGLE_DRIVE_OAUTH_JSON")"
          echo "::add-mask::$CLIENT_ID"
          echo "::add-mask::$CLIENT_SECRET"
          echo "::add-mask::$REFRESH_TOKEN"

          RESPONSE="$(curl --fail-with-body --silent --show-error \
            --request POST \
            --data-urlencode "client_id=$CLIENT_ID" \
            --data-urlencode "client_secret=$CLIENT_SECRET" \
            --data-urlencode "refresh_token=$REFRESH_TOKEN" \
            --data-urlencode 'grant_type=refresh_token' \
            'https://oauth2.googleapis.com/token')"
          ACCESS_TOKEN="$(jq -er '.access_token' <<<"$RESPONSE")"
          echo "::add-mask::$ACCESS_TOKEN"
          echo "access_token=$ACCESS_TOKEN" >> "$GITHUB_OUTPUT"
          echo "Authenticated to Google Drive without exposing OAuth credentials."

      - name: Read and validate environment variables from Google Drive
        id: load-env
        if: steps.drive-auth.outcome == 'success'
        continue-on-error: true
        shell: bash
        env:
          DRIVE_ACCESS_TOKEN: ${{ steps.drive-auth.outputs.access_token }}
        run: |
          set -Eeuo pipefail
          mkdir -p "$BUILD_LOG_DIR"
          exec > >(tee "$BUILD_LOG_DIR/load-env.log") 2>&1

          ENV_DOCUMENT="$RUNNER_TEMP/google-drive-env.txt"
          curl --fail-with-body --silent --show-error --location \
            --header "Authorization: Bearer $DRIVE_ACCESS_TOKEN" \
            "https://www.googleapis.com/drive/v3/files/${DRIVE_ENV_FILE_ID}/export?mimeType=text%2Fplain" \
            --output "$ENV_DOCUMENT"

          python3 - "$ENV_DOCUMENT" "$GITHUB_ENV" <<'PY'
          import re
          import sys

          source_path, github_env_path = sys.argv[1:]
          text = open(source_path, encoding="utf-8-sig").read().replace("\r\n", "\n")
          entries = {}
          current = None

          for raw in text.splitlines():
              line = raw.strip()
              if not line or line.startswith("#"):
                  continue
              match = re.match(r"^([A-Za-z_][A-Za-z0-9_]*)\s*[:=]\s*(.*)$", line)
              if match:
                  current = match.group(1)
                  entries[current] = match.group(2).strip()
              elif current is not None:
                  entries[current] += line
              else:
                  raise SystemExit("The Google Drive env file has text before its first NAME=value or NAME: value entry.")

          required_mobile = ("SUPABASE_URL", "SUPABASE_ANON_KEY")
          missing = [key for key in required_mobile if not entries.get(key)]
          if missing:
              raise SystemExit("Missing required mobile variable(s) in the Google Drive env file: " + ", ".join(missing))

          # Mask every value found in the Drive document before later steps run.
          # Only the public mobile values are exported to the Android build.
          for value in entries.values():
              escaped = value.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
              print(f"::add-mask::{escaped}")

          with open(github_env_path, "a", encoding="utf-8") as github_env:
              for key in required_mobile:
                  github_env.write(f"{key}<<DRIVE_ENV_EOF\n{entries[key]}\nDRIVE_ENV_EOF\n")

          print(f"Read and validated {len(entries)} environment variable(s) from Google Drive.")
          print("Exported only SUPABASE_URL and SUPABASE_ANON_KEY to the mobile build.")
          PY

          chmod 600 "$ENV_DOCUMENT"

      - name: Check out repository
        id: checkout
        if: steps.load-env.outcome == 'success'
        continue-on-error: true
        uses: actions/checkout@v4

      - name: Create mobile-safe .env
        id: mobile-env
        if: steps.checkout.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p "$BUILD_LOG_DIR"
          exec > >(tee "$BUILD_LOG_DIR/mobile-env.log") 2>&1
          {
            printf 'SUPABASE_URL=%s\n' "$SUPABASE_URL"
            printf 'SUPABASE_ANON_KEY=%s\n' "$SUPABASE_ANON_KEY"
          } > .env
          chmod 600 .env
          echo "Created a masked, mobile-safe .env from the Google Drive source."

      - name: Set up Node.js 22
        id: setup-node
        if: steps.mobile-env.outcome == 'success'
        continue-on-error: true
        uses: actions/setup-node@v4
        with:
          node-version: '22.11.0'
          cache: npm

      - name: Set up Java 17
        id: setup-java
        if: steps.setup-node.outcome == 'success'
        continue-on-error: true
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Install JavaScript dependencies
        id: npm-ci
        if: steps.setup-java.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p "$BUILD_LOG_DIR"
          exec > >(tee "$BUILD_LOG_DIR/npm-ci.log") 2>&1
          node --version
          npm --version
          npm ci --no-audit --no-fund

      - name: Compile release APK
        id: gradle-build
        if: steps.npm-ci.outcome == 'success'
        continue-on-error: true
        shell: bash
        working-directory: android
        run: |
          set -Eeuo pipefail
          mkdir -p "$BUILD_LOG_DIR"
          exec > >(tee "$BUILD_LOG_DIR/gradle-build.log") 2>&1
          chmod +x gradlew
          ./gradlew --no-daemon --console=plain --stacktrace assembleRelease

          APK_PATH="$(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' -print -quit)"
          if [[ -z "$APK_PATH" || ! -s "$APK_PATH" ]]; then
            echo "Gradle completed, but no non-empty release APK was found in android/app/build/outputs/apk/release/." >&2
            exit 1
          fi
          echo "apk_path=$PWD/$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "Release APK: $APK_PATH"

      # Refresh the one-hour access token after the potentially long Gradle build.
      - name: Refresh Google Drive access token
        id: drive-auth-upload
        if: always() && steps.drive-auth.outcome == 'success'
        continue-on-error: true
        shell: bash
        env:
          GOOGLE_DRIVE_OAUTH_JSON: ${{ secrets.GOOGLE_DRIVE_OAUTH_JSON }}
        run: |
          set -Eeuo pipefail
          mkdir -p "$BUILD_LOG_DIR"
          exec > >(tee "$BUILD_LOG_DIR/drive-auth-upload.log") 2>&1

          CLIENT_ID="$(jq -er '.client_id' <<<"$GOOGLE_DRIVE_OAUTH_JSON")"
          CLIENT_SECRET="$(jq -er '.client_secret' <<<"$GOOGLE_DRIVE_OAUTH_JSON")"
          REFRESH_TOKEN="$(jq -er '.refresh_token' <<<"$GOOGLE_DRIVE_OAUTH_JSON")"
          echo "::add-mask::$CLIENT_ID"
          echo "::add-mask::$CLIENT_SECRET"
          echo "::add-mask::$REFRESH_TOKEN"

          RESPONSE="$(curl --fail-with-body --silent --show-error \
            --request POST \
            --data-urlencode "client_id=$CLIENT_ID" \
            --data-urlencode "client_secret=$CLIENT_SECRET" \
            --data-urlencode "refresh_token=$REFRESH_TOKEN" \
            --data-urlencode 'grant_type=refresh_token' \
            'https://oauth2.googleapis.com/token')"
          ACCESS_TOKEN="$(jq -er '.access_token' <<<"$RESPONSE")"
          echo "::add-mask::$ACCESS_TOKEN"
          echo "access_token=$ACCESS_TOKEN" >> "$GITHUB_OUTPUT"
          echo "Refreshed the Google Drive access token for artifact delivery."

      - name: Upload successful APK to Google Drive APK folder
        id: upload-apk
        if: steps.gradle-build.outcome == 'success' && steps.drive-auth-upload.outcome == 'success'
        continue-on-error: true
        shell: bash
        env:
          DRIVE_ACCESS_TOKEN: ${{ steps.drive-auth-upload.outputs.access_token }}
          APK_PATH: ${{ steps.gradle-build.outputs.apk_path }}
        run: |
          set -Eeuo pipefail
          mkdir -p "$BUILD_LOG_DIR"
          exec > >(tee "$BUILD_LOG_DIR/upload-apk.log") 2>&1

          FILE_NAME="my-mobile-app-${GITHUB_SHA:0:12}.apk"
          META="$(jq -cn --arg name "$FILE_NAME" --arg parent "$DRIVE_APK_FOLDER_ID" \
            '{name: $name, parents: [$parent]}')"
          HEADERS="$RUNNER_TEMP/drive-upload-apk-headers.txt"

          curl --fail-with-body --silent --show-error --dump-header "$HEADERS" --output "$RUNNER_TEMP/drive-upload-apk-init.json" \
            --request POST \
            --header "Authorization: Bearer $DRIVE_ACCESS_TOKEN" \
            --header 'Content-Type: application/json; charset=UTF-8' \
            --header "X-Upload-Content-Type: application/vnd.android.package-archive" \
            --header "X-Upload-Content-Length: $(stat -c%s "$APK_PATH")" \
            --data "$META" \
            'https://www.googleapis.com/upload/drive/v3/files?uploadType=resumable&supportsAllDrives=true'

          LOCATION="$(awk 'BEGIN {IGNORECASE=1} /^location:/ {sub(/^[^:]*:[[:space:]]*/, ""); sub(/\r$/, ""); print; exit}' "$HEADERS")"
          if [[ -z "$LOCATION" ]]; then
            echo "Google Drive did not return a resumable upload URL." >&2
            cat "$RUNNER_TEMP/drive-upload-apk-init.json" >&2
            exit 1
          fi

          RESPONSE="$(curl --fail-with-body --silent --show-error \
            --request PUT \
            --header 'Content-Type: application/vnd.android.package-archive' \
            --data-binary "@$APK_PATH" \
            "$LOCATION")"
          FILE_ID="$(jq -r '.id // empty' <<<"$RESPONSE")"
          if [[ -z "$FILE_ID" ]]; then
            echo "Google Drive completed the upload without returning a file ID." >&2
            exit 1
          fi
          echo "APK uploaded to Google Drive as $FILE_NAME (file ID: $FILE_ID)."

      - name: Write a precise failure report
        id: failure-report
        if: always()
        continue-on-error: true
        shell: bash
        env:
          AUTH_OUTCOME: ${{ steps.drive-auth.outcome }}
          ENV_OUTCOME: ${{ steps.load-env.outcome }}
          CHECKOUT_OUTCOME: ${{ steps.checkout.outcome }}
          MOBILE_ENV_OUTCOME: ${{ steps.mobile-env.outcome }}
          NODE_OUTCOME: ${{ steps.setup-node.outcome }}
          JAVA_OUTCOME: ${{ steps.setup-java.outcome }}
          NPM_OUTCOME: ${{ steps.npm-ci.outcome }}
          BUILD_OUTCOME: ${{ steps.gradle-build.outcome }}
          REFRESH_AUTH_OUTCOME: ${{ steps.drive-auth-upload.outcome }}
          APK_UPLOAD_OUTCOME: ${{ steps.upload-apk.outcome }}
        run: |
          set -Eeuo pipefail
          mkdir -p "$BUILD_LOG_DIR"
          REPORT_DATE="$(TZ=Asia/Kolkata date +%F)"
          REPORT="$RUNNER_TEMP/${REPORT_DATE}.txt"
          HAS_FAILURE=false

          declare -a RECORDS=(
            "Authenticate to Google Drive|$AUTH_OUTCOME|drive-auth.log"
            "Read and validate environment variables from Google Drive|$ENV_OUTCOME|load-env.log"
            "Check out repository|$CHECKOUT_OUTCOME|"
            "Create mobile-safe .env|$MOBILE_ENV_OUTCOME|mobile-env.log"
            "Set up Node.js 22|$NODE_OUTCOME|"
            "Set up Java 17|$JAVA_OUTCOME|"
            "Install JavaScript dependencies|$NPM_OUTCOME|npm-ci.log"
            "Compile release APK|$BUILD_OUTCOME|gradle-build.log"
            "Refresh Google Drive access token|$REFRESH_AUTH_OUTCOME|drive-auth-upload.log"
            "Upload successful APK to Google Drive APK folder|$APK_UPLOAD_OUTCOME|upload-apk.log"
          )

          {
            echo "Android APK build failure"
            echo "Date: $REPORT_DATE (Asia/Kolkata)"
            echo "Repository: $GITHUB_REPOSITORY"
            echo "Commit: $GITHUB_SHA"
            echo "Workflow run: https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo

            for record in "${RECORDS[@]}"; do
              IFS='|' read -r step outcome log_file <<<"$record"
              if [[ "$outcome" == "failure" || "$outcome" == "cancelled" ]]; then
                HAS_FAILURE=true
                echo "FAILED STEP: $step"
                echo "GitHub Actions outcome: $outcome"
                if [[ -n "$log_file" && -s "$BUILD_LOG_DIR/$log_file" ]]; then
                  echo "Reason and final diagnostic output:"
                  tail -n 160 "$BUILD_LOG_DIR/$log_file"
                else
                  echo "Reason: The GitHub Action failed before command-level diagnostics could be captured. Open the workflow-run link above for the action's full error message."
                fi
                echo
              fi
            done
          } > "$REPORT"

          if [[ "$HAS_FAILURE" == "true" ]]; then
            echo "has_failure=true" >> "$GITHUB_OUTPUT"
            echo "report_path=$REPORT" >> "$GITHUB_OUTPUT"
            echo "report_name=${REPORT_DATE}.txt" >> "$GITHUB_OUTPUT"
            echo "Created $REPORT with the failed step(s) and diagnostic output."
          else
            rm -f "$REPORT"
            echo "has_failure=false" >> "$GITHUB_OUTPUT"
            echo "All required steps succeeded; no failure report was created."
          fi

      - name: Save failure report to Google Drive Failure folder
        id: upload-failure
        if: always() && steps.failure-report.outputs.has_failure == 'true' && steps.drive-auth-upload.outcome == 'success'
        continue-on-error: true
        shell: bash
        env:
          DRIVE_ACCESS_TOKEN: ${{ steps.drive-auth-upload.outputs.access_token }}
          REPORT_PATH: ${{ steps.failure-report.outputs.report_path }}
          REPORT_NAME: ${{ steps.failure-report.outputs.report_name }}
        run: |
          set -Eeuo pipefail
          mkdir -p "$BUILD_LOG_DIR"
          exec > >(tee "$BUILD_LOG_DIR/upload-failure.log") 2>&1

          # A date has one canonical report. Update today's file if a rerun or
          # later push already created it; otherwise create it.
          QUERY="name = '$REPORT_NAME' and '$DRIVE_FAILURE_FOLDER_ID' in parents and trashed = false"
          LIST_RESPONSE="$(curl --fail-with-body --silent --show-error --get \
            --header "Authorization: Bearer $DRIVE_ACCESS_TOKEN" \
            --data-urlencode "q=$QUERY" \
            --data-urlencode 'fields=files(id,name)' \
            --data-urlencode 'supportsAllDrives=true' \
            --data-urlencode 'includeItemsFromAllDrives=true' \
            'https://www.googleapis.com/drive/v3/files')"
          EXISTING_ID="$(jq -r '.files[0].id // empty' <<<"$LIST_RESPONSE")"

          META="$(jq -cn --arg name "$REPORT_NAME" --arg parent "$DRIVE_FAILURE_FOLDER_ID" \
            '{name: $name, parents: [$parent]}')"
          HEADERS="$RUNNER_TEMP/drive-upload-failure-headers.txt"

          if [[ -n "$EXISTING_ID" ]]; then
            START_URL="https://www.googleapis.com/upload/drive/v3/files/${EXISTING_ID}?uploadType=resumable&supportsAllDrives=true"
            METHOD=PATCH
            META="$(jq -cn --arg name "$REPORT_NAME" '{name: $name}')"
          else
            START_URL='https://www.googleapis.com/upload/drive/v3/files?uploadType=resumable&supportsAllDrives=true'
            METHOD=POST
          fi

          curl --fail-with-body --silent --show-error --dump-header "$HEADERS" --output "$RUNNER_TEMP/drive-upload-failure-init.json" \
            --request "$METHOD" \
            --header "Authorization: Bearer $DRIVE_ACCESS_TOKEN" \
            --header 'Content-Type: application/json; charset=UTF-8' \
            --header 'X-Upload-Content-Type: text/plain; charset=UTF-8' \
            --header "X-Upload-Content-Length: $(stat -c%s "$REPORT_PATH")" \
            --data "$META" \
            "$START_URL"

          LOCATION="$(awk 'BEGIN {IGNORECASE=1} /^location:/ {sub(/^[^:]*:[[:space:]]*/, ""); sub(/\r$/, ""); print; exit}' "$HEADERS")"
          if [[ -z "$LOCATION" ]]; then
            echo "Google Drive did not return a resumable upload URL for the failure report." >&2
            cat "$RUNNER_TEMP/drive-upload-failure-init.json" >&2
            exit 1
          fi

          RESPONSE="$(curl --fail-with-body --silent --show-error \
            --request PUT \
            --header 'Content-Type: text/plain; charset=UTF-8' \
            --data-binary "@$REPORT_PATH" \
            "$LOCATION")"
          FILE_ID="$(jq -r '.id // empty' <<<"$RESPONSE")"
          if [[ -z "$FILE_ID" ]]; then
            echo "Google Drive completed the failure-report upload without returning a file ID." >&2
            exit 1
          fi
          echo "Failure report saved as $REPORT_NAME in the Google Drive Failure folder (file ID: $FILE_ID)."

      - name: Set final workflow result
        if: always()
        shell: bash
        env:
          AUTH_OUTCOME: ${{ steps.drive-auth.outcome }}
          ENV_OUTCOME: ${{ steps.load-env.outcome }}
          CHECKOUT_OUTCOME: ${{ steps.checkout.outcome }}
          MOBILE_ENV_OUTCOME: ${{ steps.mobile-env.outcome }}
          NODE_OUTCOME: ${{ steps.setup-node.outcome }}
          JAVA_OUTCOME: ${{ steps.setup-java.outcome }}
          NPM_OUTCOME: ${{ steps.npm-ci.outcome }}
          BUILD_OUTCOME: ${{ steps.gradle-build.outcome }}
          REFRESH_AUTH_OUTCOME: ${{ steps.drive-auth-upload.outcome }}
          APK_UPLOAD_OUTCOME: ${{ steps.upload-apk.outcome }}
          FAILURE_PRESENT: ${{ steps.failure-report.outputs.has_failure }}
          FAILURE_UPLOAD_OUTCOME: ${{ steps.upload-failure.outcome }}
        run: |
          set -Eeuo pipefail
          for outcome in \
            "$AUTH_OUTCOME" "$ENV_OUTCOME" "$CHECKOUT_OUTCOME" "$MOBILE_ENV_OUTCOME" \
            "$NODE_OUTCOME" "$JAVA_OUTCOME" "$NPM_OUTCOME" "$BUILD_OUTCOME" \
            "$REFRESH_AUTH_OUTCOME" "$APK_UPLOAD_OUTCOME"; do
            [[ "$outcome" == "success" ]] || exit 1
          done

          if [[ "$FAILURE_PRESENT" == "true" && "$FAILURE_UPLOAD_OUTCOME" != "success" ]]; then
            echo "The build failed and the required Google Drive failure report could not be uploaded." >&2
            exit 1
          fi

          echo "Android release APK build and Google Drive upload both succeeded."
